name: LinkedIn Auto Post

on:
  schedule:
    - cron: '30 7 * * *'   # 1:00 PM IST daily (UTC+5:30)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'post'
        type: choice
        options:
          - post

jobs:
  run-linkedin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Run LinkedIn Agent
        run: python linkedin.py
        timeout-minutes: 20
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_ID: ${{ secrets.LINKEDIN_PERSON_ID }}
          TOPIC: "Agentic AI cybersecurity and autonomous threat detection"
          RUN_MODE: ${{ github.event.inputs.mode || 'post' }}

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-pdf-book
          path: /tmp/*.pdf
          retention-days: 7
        continue-on-error: true
